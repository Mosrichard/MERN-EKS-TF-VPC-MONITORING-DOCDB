name: Deploy to EKS

on:
  workflow_call:


jobs:
  deploy-to-eks:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout the code
      uses: actions/checkout@v3

    - name: Configure AWS ( ODIC )
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ap-south-1

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Update Kubeconfig
      run: aws eks update-kubeconfig --name my-eks-cluster --region ap-south-1

    - name: Wait for nodes to be ready
      run: |
        echo "Waiting for nodes to join cluster..."
        for i in {1..30}; do
          NODE_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)
          if [ "$NODE_COUNT" -ge 1 ]; then
            echo "Nodes found: $NODE_COUNT"
            kubectl get nodes
            kubectl wait --for=condition=Ready nodes --all --timeout=300s
            break
          fi
          echo "Attempt $i: No nodes yet, waiting 20s..."
          sleep 20
        done
        
        # Final check
        FINAL_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)
        if [ "$FINAL_COUNT" -eq 0 ]; then
          echo "ERROR: No nodes joined after 10 minutes"
          echo "Checking node group status..."
          aws eks describe-nodegroup --cluster-name my-eks-cluster --nodegroup-name standard-nodes --region ap-south-1
          exit 1
        fi

    - name: Install metrics server
      run: |
        helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
        helm upgrade --install metrics-server metrics-server/metrics-server \
        --namespace kube-system \
        --set args="{--kubelet-insecure-tls}"

    - name: Ensure Namespace Exists
      run: |
        kubectl create namespace mern-app --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Database Secret
      run: |
        RDS_ENDPOINT=$(aws rds describe-db-instances --db-instance-identifier my-mysql-db --region ap-south-1 --query 'DBInstances[0].Endpoint.Address' --output text)
        RDS_PASSWORD=$(aws secretsmanager get-secret-value --secret-id terraform-rds-password --region ap-south-1 --query SecretString --output text 2>/dev/null || echo "")
        
        if [ -z "$RDS_PASSWORD" ]; then
          echo "Warning: Could not retrieve password from Secrets Manager, using placeholder"
          RDS_PASSWORD="PLACEHOLDER"
        fi
        
        kubectl create secret generic db-secret \
          --from-literal=DATABASE_URL="mysql://admin:${RDS_PASSWORD}@${RDS_ENDPOINT}:3306/merndb" \
          -n mern-app \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply Kubernetes manifests
      run: kubectl apply -f ./kubernetes-manifests/app/

    - name: Update Images
      run: |
        kubectl set image deployment/frontend \
        frontend=${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-frontend:${{ github.sha }} \
        -n mern-app --record

        kubectl set image deployment/backend \
        backend=${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-backend:${{ github.sha }} \
        -n mern-app --record

    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/frontend -n mern-app --timeout=120s || kubectl describe deployment/frontend -n mern-app
        kubectl rollout status deployment/backend -n mern-app --timeout=120s || kubectl describe deployment/backend -n mern-app
