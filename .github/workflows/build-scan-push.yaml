name: CI - Build, Scan & Push

on:
  workflow_call:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # --- Build Stage ---

    - name: Build Backend Image
      run: |
        docker build -t ${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-backend:${{ github.sha }} ./backend

    - name: Build Frontend Image
      run: |
        docker build -t ${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-frontend:${{ github.sha }} ./frontend

    # --- Scan Stage (Non-Blocking) ---
    
    - name: Scan Backend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-backend:${{ github.sha }}
        format: 'table'
        exit-code: '0' # 0 means warning only; pipeline continues
        severity: 'CRITICAL,HIGH'

    - name: Scan Frontend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-frontend:${{ github.sha }}
        format: 'table'
        exit-code: '0' # 0 means warning only; pipeline continues
        severity: 'CRITICAL,HIGH'

    # --- Push Stage ---

    - name: Push Backend Image
      run: |
        docker push ${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-backend:${{ github.sha }}

    - name: Push Frontend Image
      run: |
        docker push ${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-frontend:${{ github.sha }}

    # --- Optional: Generate and Upload JSON Report ---

    - name: Generate JSON Report
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ vars.DOCKERHUB_USERNAME }}/cicd-tf-vpc-actions-backend:${{ github.sha }}
        format: 'json'
        output: 'trivy-results.json'

    - name: Upload Scan Report
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-report
        path: trivy-results.json
